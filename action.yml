name: 'ThunderLang Check'
description: 'Gate .thunder files with the deterministic ThunderLang compiler. No AI. Fails the build if any intent has errors.'
author: 'SkillsTech'
branding:
  icon: 'check-circle'
  color: 'yellow'

inputs:
  paths:
    description: 'File or directory to check. A directory is recursed; every .thunder under it is gated. Default: the whole repo.'
    required: false
    default: '.'
  version:
    description: 'npm version or tag of @skillstechtalk/thunderlang. Directory checking needs >= 0.1.1. Default: latest.'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: intent check
      shell: bash
      run: npx --yes "@skillstechtalk/thunderlang@${{ inputs.version }}" check "${{ inputs.paths }}"
