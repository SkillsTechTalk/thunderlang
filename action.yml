name: 'IntentLang Check'
description: 'Gate .intent files with the deterministic IntentLang compiler. No AI. Fails the build if any intent has errors.'
author: 'SkillsTech'
branding:
  icon: 'check-circle'
  color: 'yellow'

inputs:
  paths:
    description: 'File or directory to check. A directory is recursed; every .intent under it is gated. Default: the whole repo.'
    required: false
    default: '.'
  version:
    description: 'npm version or tag of @skillstech/intentlang. Directory checking needs >= 0.1.1. Default: latest.'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: intent check
      shell: bash
      run: npx --yes "@skillstech/intentlang@${{ inputs.version }}" check "${{ inputs.paths }}"
