name: Intent Check

# Gate every .thunder file with the deterministic compiler (no AI, no network).
# `thunder check` fails the build if any intent has errors, so a broken or
# incomplete intent cannot merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  intent-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The compiler is pure Node (no dependencies), so no install step is needed.
      - name: intent check (all .thunder files)
        run: npm run intent:check

      # Compiler unit + property tests.
      - name: intent tests
        run: npm run intent:test

      # Keep the docs honest against the shipped compiler (links, diagnostic codes,
      # parseable code blocks, doc registration).
      - name: docs consistency
        run: npm run docs:check

      # Keep the committed canonical schema in sync with the compiler.
      - name: schema sync
        run: npm run schema:check

      # Keep the diagnostics catalog doc in sync with the compiler's rule catalog.
      - name: diagnostics doc sync
        run: npm run diagnostics:check

      # Every .thunder file stays canonically formatted.
      - name: format check
        run: npm run fmt:check

      # The published tarball installs clean and its main API, /core subpath, and CLI all
      # work from the installed package (catches broken exports maps / files lists / barrels).
      - name: package smoke test
        run: npm run pack:smoke

  # Dogfood: scan this repo's own .thunder files with ThunderLang and publish the results to
  # GitHub code scanning, so diagnostics show up as annotations in the Security tab.
  intent-code-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: intent check -> SARIF
        run: node compiler/src/cli.mjs check . --format sarif > intent.sarif
      - name: upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: intent.sarif
