name: Intent Check

# Gate every .intent file with the deterministic compiler (no AI, no network).
# `intent check` fails the build if any intent has errors, so a broken or
# incomplete intent cannot merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  intent-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The compiler is pure Node (no dependencies), so no install step is needed.
      - name: intent check (all .intent files)
        run: npm run intent:check

      # Compiler unit + property tests.
      - name: intent tests
        run: npm run intent:test

      # Keep the docs honest against the shipped compiler (links, diagnostic codes,
      # parseable code blocks, doc registration).
      - name: docs consistency
        run: npm run docs:check

      # Keep the committed canonical schema in sync with the compiler.
      - name: schema sync
        run: npm run schema:check

      # Every .intent file stays canonically formatted.
      - name: format check
        run: npm run fmt:check
